stages:
  - build
  - package
  - test

variables:
  OUTPUT_DIR: "$CI_PROJECT_DIR/build"
  BUILD_NUM: "$CI_PIPELINE_IID"
  MODULE_VERSION: "${CI_COMMIT_TAG:-1.0.0}-build${CI_PIPELINE_IID}-g${CI_COMMIT_SHORT_SHA}"

.build_template:
  stage: build
  script:
      - export TARGET_ARCH=$(uname -m)
      - export TARGET_OS=$(grep -oP '(?<=^ID=).+' /etc/os-release | tr -d '"' || echo "debian")
      - export KERNEL_HEADERS_DIR=$(ls -d /usr/src/linux-headers-*-generic 2>/dev/null | head -n 1 || ls -d /usr/src/linux-headers-* 2>/dev/null | grep -v "common" | head -n 1)
      - export KERNEL_HEADERS="$KERNEL_HEADERS_DIR"
      - make ci-build
  artifacts:
    name: "accord-le-build-$CI_JOB_NAME-$CI_PIPELINE_IID"
    paths:
      - build/dist/
      - build/packages/
    expire_in: 1 week

.env_template:
  before_script:
    - apt-get update -yqq
    - apt-get install -yqq build-essential sudo git linux-headers-generic dpkg-dev rpm

# Матрица сборки для разных дистрибутивов
build:matrix:
  extends: .build_template
  parallel:
    matrix:
      - OS_IMAGE: ["ubuntu:20.04", "ubuntu:22.04", "ubuntu:24.04", "debian:11", "debian:12"]
  image: $OS_IMAGE
  before_script:
    - apt-get update -yqq
    - apt-get install -yqq build-essential sudo git linux-headers-generic
    
# --- Этап PACKAGE ---
package:
  extends: .env_template
  stage: package
  image: ubuntu:22.04
  script:
    # Восстанавливаем артефакты из build/dist, если они нужны для упаковки (например .ko)
    - cp build/dist/accord-le.ko driver/ 2>/dev/null || echo "Файл уже на месте или отсутствует"
    - make ci-package
  needs:
    - job: build:matrix
      artifacts: true
  artifacts:
    name: "accord-le-packages-$CI_PIPELINE_IID"
    paths:
      - build/dist/
      - build/packages/
    expire_in: 2 weeks