# ==========================================
# Минимальный pipeline для отладки
# Только сборка для Debian 12
# ==========================================

stages:
  - validate
  - build

# ==========================================
# Глобальные переменные
# ==========================================
variables:
  MODULE_VERSION: "1.0.0"
  BUILD_NUM: "1"
  GIT_DEPTH: "20"

# ==========================================
# Валидация
# ==========================================
validate-config:
  stage: validate
  image: alpine:latest
  before_script:
    - apk add --no-cache git make
  script:
    - echo "🔍 Проверка структуры проекта..."
    - ls -la
    - echo "🔍 Проверка Makefile..."
    - make help || echo "make help завершился с ошибкой"
    - echo "✅ Валидация завершена"

# ==========================================
# Сборка (только Debian 12)
# ==========================================
build-debian-12:
  stage: build
  image: debian:12
  before_script:
    - echo "🔍 Установка зависимостей..."
    - apt update
    - apt install -y git build-essential make kmod linux-headers-amd64
    - echo "🔍 Версия ядра хоста: $(uname -r)"
    - echo "🔍 Версия в контейнере: $(uname -r)"
    - echo "🔍 Проверка заголовков ядра:"
    - ls -la /lib/modules/ || echo "Нет /lib/modules"
    - ls -la /lib/modules/$(uname -r)/ 2>/dev/null || echo "Нет директории для текущего ядра"
    - echo "🔍 Настройка git..."
    - git remote set-url origin http://localhost/root/33.git
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
    - echo "🔍 Структура проекта:"
    - ls -la
  script:
    - echo "🔨 Запуск сборки..."
    - make ci-build MODULE_VERSION=${MODULE_VERSION} BUILD_NUM=${BUILD_NUM}
    - echo "✅ Сборка завершена"
    - echo "📂 Содержимое build/:"
    - ls -la build/ || echo "build/ не создан"
  artifacts:
    paths:
      - build/
    expire_in: 1 week

# ==========================================
# Правила запуска
# ==========================================
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_TAG
    - when: always