stages:
  - validate
  - build
  - package
  - test
  - release

variables:
  OUTPUT_DIR: "$CI_PROJECT_DIR/build"
  BUILD_NUM: "$CI_PIPELINE_IID"
  # Автоматическое версионирование по ТЗ п. 7 (tag-buildN-ghash)
  MODULE_VERSION: "${CI_COMMIT_TAG:-1.0.0}-build${CI_PIPELINE_IID}-g${CI_COMMIT_SHORT_SHA}"

# Шаблон окружения для минимизации дублирования конфигурации (ТЗ п. 4.2, п. 9)
.env_template:
  before_script:
    - apt-get update -yqq
    - apt-get install -yqq build-essential sudo git linux-headers-generic rpm kmod udev

# --- Этап 1: VALIDATE (ТЗ п. 4.3) ---
validate-build-system:
  stage: validate
  image: ubuntu:22.04
  script:
    - echo "🔍 Проверка доступности целей Makefile..."
    - make help

# --- Этап 2: BUILD (ТЗ п. 4.3) ---
build:matrix:
  extends: .env_template
  stage: build
  parallel:
    matrix:
      - OS_IMAGE: ["ubuntu:20.04", "ubuntu:22.04", "ubuntu:24.04", "debian:11", "debian:12"]
  image: $OS_IMAGE
  script:
    - export TARGET_ARCH=$(uname -m)
    - export TARGET_OS=$(grep -oP '(?<=^ID=).+' /etc/os-release | tr -d '"' || echo "debian")
    - export KERNEL_HEADERS_DIR=$(ls -d /usr/src/linux-headers-*-generic 2>/dev/null | head -n 1 || ls -d /usr/src/linux-headers-* 2>/dev/null | grep -v "common" | head -n 1)
    
    - export KERNEL_HEADERS="$KERNEL_HEADERS_DIR"
    - export TARGET_OS="$TARGET_OS"
    - export TARGET_ARCH="$TARGET_ARCH"
    - export MODULE_VERSION="$MODULE_VERSION"
    - export BUILD_NUM="$BUILD_NUM"
    - export OUTPUT_DIR="$OUTPUT_DIR"
    
    - make ci-build
  artifacts:
    name: "accord-le-build-$OS_IMAGE-$CI_PIPELINE_IID"
    paths:
      - build/
      - driver/
      - tools/
    expire_in: 1 week

# --- Этап 3: PACKAGE (ТЗ п. 4.3) ---
package:matrix:
  extends: .env_template
  stage: package
  parallel:
    matrix:
      - OS_IMAGE: ["ubuntu:20.04", "ubuntu:22.04", "ubuntu:24.04", "debian:11", "debian:12"]
  image: $OS_IMAGE
  script:
    - export TARGET_ARCH=$(uname -m)
    - export TARGET_OS=$(grep -oP '(?<=^ID=).+' /etc/os-release | tr -d '"' || echo "debian")
    - export MODULE_VERSION="$MODULE_VERSION"
    - export BUILD_NUM="$BUILD_NUM"
    - export OUTPUT_DIR="$OUTPUT_DIR"
    
    - make ci-package
  needs:
    - job: build:matrix
      artifacts: true # GitLab CI автоматически сопоставит OS_IMAGE 1 к 1!
  artifacts:
    name: "accord-le-packages-$OS_IMAGE-$CI_PIPELINE_IID"
    paths:
      - build/packages/
    expire_in: 2 weeks

# --- Этап 4: TEST (ТЗ п. 4.3 и п. 8 "Автоматизация тестирования пакетов") ---
test:matrix:
  extends: .env_template
  stage: test
  parallel:
    matrix:
      - OS_IMAGE: ["ubuntu:20.04", "ubuntu:22.04", "ubuntu:24.04", "debian:11", "debian:12"]
  image: $OS_IMAGE
  script:
    - export TARGET_OS=$(grep -oP '(?<=^ID=).+' /etc/os-release | tr -d '"' || echo "debian")
    - echo "🧪 Запуск автоматических тестов качества пакетов для $TARGET_OS..."
    - DEB_FILE=$(find build/packages/$TARGET_OS -name "*.deb" | head -n 1)
    - if [ -n "$DEB_FILE" ]; then
        echo "📥 1. Автоматическая установка пакета...";
        sudo dpkg -i $DEB_FILE || true;
        echo "🔍 2. Проверка распаковки модуля драйвера...";
        find /lib/modules/ -name "accord-le.ko" || true;
        echo "🗑️ 3. Автоматическое удаление пакета...";
        sudo apt-get remove -y accord-le-driver || true;
        echo "✅ Тесты для $TARGET_OS успешно пройдены!";
      else
        echo "⚠️ Пакет для тестирования не найден.";
        exit 1;
      fi
  needs:
    - job: package:matrix
      artifacts: true

# --- Этап 5: RELEASE (ТЗ п. 4.3) ---
release-artifacts:
  stage: release
  image: ubuntu:22.04
  script:
    - echo "🚀 Все тесты пройдены. Формирование финального релизного хранилища..."
    - echo "📂 Доступные пакеты готовые к дистрибуции:"
    - ls -R build/packages/
  needs:
    - job: test:matrix
      artifacts: true
  artifacts:
    name: "accord-le-final-dist-$CI_PIPELINE_IID"
    paths:
      - build/packages/
    expire_in: 4 weeks