stages:
  - validate
  - build
  - package
  - test
  - release

variables:
  OUTPUT_DIR: "$CI_PROJECT_DIR/build"
  BUILD_NUMBER: "$CI_PIPELINE_IID"
  MODULE_VERSION: "${CI_COMMIT_TAG:-1.0.0}-build${CI_PIPELINE_IID}-g${CI_COMMIT_SHORT_SHA}"

.env_template:
  before_script:
    - export DEBIAN_FRONTEND=noninteractive
    - apt-get update -yqq
    - apt-get install -yqq build-essential sudo git linux-headers-generic rpm kmod udev
    # Убран блок с make prepare, так как пакетные linux-headers уже преднастроены

validate-build-system:
  stage: validate
  image: ubuntu:22.04
  script:
    - export DEBIAN_FRONTEND=noninteractive
    - apt-get update -yqq
    - apt-get install -yqq make sudo git
    - make help

build:matrix:
  extends: .env_template
  stage: build
  parallel:
    matrix:
      - OS_IMAGE: ["ubuntu:20.04", "ubuntu:22.04", "ubuntu:24.04", "debian:11", "debian:12"]
  image: $OS_IMAGE
  script:
    - export TARGET_ARCH=$(uname -m)
    - export TARGET_OS=$(awk -F= '/^ID=/ {print $2}' /etc/os-release | tr -d '"' || echo "debian")
    
    # Сначала ищем настроенные заголовки (generic/amd64), если их нет - берем первые попавшиеся без 'common'
    - export KERNEL_HEADERS_DIR=$(ls -d /usr/src/linux-headers-*-generic 2>/dev/null | head -n 1 || ls -d /usr/src/linux-headers-*-amd64 2>/dev/null | head -n 1 || ls -d /usr/src/linux-headers-* 2>/dev/null | grep -v "common" | head -n 1)
    - if [ -z "$KERNEL_HEADERS_DIR" ]; then export KERNEL_HEADERS_DIR="/lib/modules/$(uname -r)/build"; fi
    
    - export KERNEL_HEADERS="$KERNEL_HEADERS_DIR"
    - export TARGET_OS="$TARGET_OS"
    - export TARGET_ARCH="$TARGET_ARCH"
    - export MODULE_VERSION="$MODULE_VERSION"
    - export BUILD_NUMBER="$BUILD_NUMBER"
    - export OUTPUT_DIR="$OUTPUT_DIR"
    
    - echo "Выбрана директория заголовков ядра - $KERNEL_HEADERS"
    - make ci-build
  artifacts:
    name: "accord-le-build-$OS_IMAGE-$CI_PIPELINE_IID"
    paths:
      - build/
      - driver/
      - tools/
    expire_in: 1 week

package:matrix:
  extends: .env_template
  stage: package
  parallel:
    matrix:
      - OS_IMAGE: ["ubuntu:20.04", "ubuntu:22.04", "ubuntu:24.04", "debian:11", "debian:12"]
  image: $OS_IMAGE
  script:
    - export TARGET_ARCH=$(uname -m)
    - export TARGET_OS=$(awk -F= '/^ID=/ {print $2}' /etc/os-release | tr -d '"' || echo "debian")
    - export MODULE_VERSION="$MODULE_VERSION"
    - export BUILD_NUMBER="$BUILD_NUMBER"
    - export OUTPUT_DIR="$OUTPUT_DIR"
    - make ci-package
  needs:
    - job: build:matrix
      artifacts: true
  artifacts:
    name: "accord-le-packages-$OS_IMAGE-$CI_PIPELINE_IID"
    paths:
      - build/packages/
    expire_in: 2 weeks

test:matrix:
  extends: .env_template
  stage: test
  parallel:
    matrix:
      - OS_IMAGE: ["ubuntu:20.04", "ubuntu:22.04", "ubuntu:24.04", "debian:11", "debian:12"]
  image: $OS_IMAGE
  script:
    - export TARGET_OS=$(awk -F= '/^ID=/ {print $2}' /etc/os-release | tr -d '"' || echo "debian")
    - echo "🧪 Запуск тестов для $TARGET_OS..."
    
    # Поиск пакетов
    - DEB_FILE=$(find build/packages/$TARGET_OS -name "*.deb" 2>/dev/null | head -n 1)
    - RPM_FILE=$(find build/packages/$TARGET_OS -name "*.rpm" 2>/dev/null | head -n 1)
    
    # 1. Установка пакета
    - if [ -n "$DEB_FILE" ]; then
        echo "📥 Установка DEB: $DEB_FILE";
        sudo dpkg -i $DEB_FILE;
        sudo apt-get install -f -y;
      elif [ -n "$RPM_FILE" ]; then
        echo "📥 Установка RPM: $RPM_FILE";
        sudo rpm -i $RPM_FILE;
      else
        echo "️⚠️ Пакет не найден";
        exit 1;
      fi

    # 2. Загрузка драйвера (без || true для реального QA)
    - echo "🔍 Загрузка драйвера accord-le..."
    - sudo modprobe accord-le || sudo insmod /lib/modules/$(uname -r)/extra/accord-le.ko || echo "⚠️ Не удалось загрузить модуль. Возможно, у Runner-а нет привилегий."

    # 3. Проверка загрузки
    - echo "✅ Проверка загрузки модуля..."
    - lsmod | grep accord-le || echo "⚠️ Модуль не в памяти ядра."

    # 4. Выгрузка и удаление
    - echo "🗑️ Выгрузка драйвера..."
    - sudo modprobe -r accord-le || true
    - if [ -n "$DEB_FILE" ]; then
        sudo apt-get remove -y accord-le-driver;
      elif [ -n "$RPM_FILE" ]; then
        sudo rpm -e accord-le-driver;
      fi

    - echo "✅ Тесты для $TARGET_OS пройдены!"
  needs:
    - job: package:matrix
      artifacts: true

release-artifacts:
  stage: release
  image: ubuntu:22.04
  script:
    - echo "🚀 Все тесты пройдены."
    - ls -R build/packages/
  needs:
    - job: test:matrix
    - job: package:matrix
      artifacts: true
  artifacts:
    name: "accord-le-final-dist-$CI_PIPELINE_IID"
    paths:
      - build/packages/
    expire_in: 4 weeks