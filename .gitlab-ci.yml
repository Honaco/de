stages:
  - validate
  - build
  - package
  - test
  - release

variables:
  OUTPUT_DIR: "$CI_PROJECT_DIR/build"
  BUILD_NUMBER: "$CI_PIPELINE_IID"

# Расширенная матрица для сборки (Debian, Ubuntu, Astra, ALT, РЕД ОС)
.os_matrix:
  parallel:
    matrix:
      - OS_NAME: "redos"
        OS_IMAGE: "registry.red-soft.ru/ubi7/ubi:latest" # <-- Правильный открытый образ РЕД ОС 7.3
        HEADERS_PKG: "kernel-devel"
        PKG_EXT: "rpm"
        MAKE_TARGET: "package-rpm"
        PKG_INFO_CMD: "rpm -qip"
        PKG_LIST_CMD: "rpm -qlp"
        EXTRA_PKGS: "rpm-build gcc make"
      - OS_NAME: "debian"
        OS_IMAGE: "debian:12"
        HEADERS_PKG: "linux-headers-amd64"
        PKG_EXT: "deb"
        MAKE_TARGET: "package-deb"
        PKG_INFO_CMD: "dpkg-deb -I"
        PKG_LIST_CMD: "dpkg-deb -c"
        EXTRA_PKGS: ""
      - OS_NAME: "ubuntu"
        OS_IMAGE: "ubuntu:20.04"
        HEADERS_PKG: "linux-headers-generic"
        PKG_EXT: "deb"
        MAKE_TARGET: "package-deb"
        PKG_INFO_CMD: "dpkg-deb -I"
        PKG_LIST_CMD: "dpkg-deb -c"
        EXTRA_PKGS: ""
      - OS_NAME: "astra"
        OS_IMAGE: "registry.astralinux.ru/library/astra/ubi18:latest"
        HEADERS_PKG: "linux-headers-hardened-amd64"
        PKG_EXT: "deb"
        MAKE_TARGET: "package-deb"
        PKG_INFO_CMD: "dpkg-deb -I"
        PKG_LIST_CMD: "dpkg-deb -c"
        EXTRA_PKGS: ""
      - OS_NAME: "alt"
        OS_IMAGE: "alt:p10"
        HEADERS_PKG: "kernel-headers-modules-std-def"
        PKG_EXT: "rpm"
        MAKE_TARGET: "package-rpm"
        PKG_INFO_CMD: "rpm -qip"
        PKG_LIST_CMD: "rpm -qlp"
        EXTRA_PKGS: "rpm-build"

# Шаблон окружения
.env_template:
  image: $OS_IMAGE
  before_script:
    - |
      # 1. Адаптивная установка зависимостей в зависимости от пакетного менеджера (apt vs dnf/yum)
      if command -v apt-get >/dev/null 2>&1; then
        export DEBIAN_FRONTEND=noninteractive
        apt-get update -yqq
        
        # Поиск заголовков ядра для Debian/Astra
        if [ -n "$HEADERS_PKG" ] && ! apt-cache show "$HEADERS_PKG" >/dev/null 2>&1; then
          echo "⚠️ Пакет $HEADERS_PKG не найден в $OS_NAME. Ищем альтернативные заголовки ядра...";
          FOUND_PKG=$(apt-cache search "^linux-headers-" | grep -E "hardened|generic|amd64|astra" | head -n 1 | awk '{print $1}');
          if [ -n "$FOUND_PKG" ]; then
            echo "💡 Найден пакет: $FOUND_PKG";
            HEADERS_PKG="$FOUND_PKG";
          fi;
        fi
        
        apt-get install -yqq build-essential sudo git $HEADERS_PKG rpm kmod udev $EXTRA_PKGS
      elif command -v dnf >/dev/null 2>&1 || command -v yum >/dev/null 2>&1; then
        PKG_MGR=$(command -v dnf || command -v yum)
        $PKG_MGR update -y --nobest || true
        $PKG_MGR install -y gcc gcc-c++ make sudo git kmod udev rpm-build $HEADERS_PKG $EXTRA_PKGS
      fi
      
    - export MODULE_VERSION="${CI_COMMIT_TAG:-1.0.0}-build${CI_PIPELINE_IID}-g${CI_COMMIT_SHORT_SHA}"

validate-build-system:
  stage: validate
  extends: 
    - .env_template
    - .os_matrix
  script:
    - make help

build:
  stage: build
  extends: 
    - .env_template
    - .os_matrix
  script:
    - export KERNEL_HEADERS=$(find /lib/modules -type l -name build | head -n 1)
    - echo "Используем заголовки ядра по пути $KERNEL_HEADERS для $OS_NAME"
    - export TARGET_OS="$OS_NAME"
    - export TARGET_ARCH=$(uname -m)
    - make ci-build MODULE_VERSION="$MODULE_VERSION"
  artifacts:
    paths:
      - build/
      - driver/
      - tools/
    expire_in: 1 week

package:
  stage: package
  extends: 
    - .env_template
    - .os_matrix
  script:
    - export TARGET_OS="$OS_NAME"
    - export TARGET_ARCH=$(uname -m)
    
    # Настройка rpmbuild для работы от root (для RPM-систем: ALT и РЕД ОС)
    - if [ "$PKG_EXT" = "rpm" ]; then
        echo "🔧 Настройка rpmbuild для работы от root...";
        echo "%_topdir $(pwd)/build/rpm" > ~/.rpmmacros;
        echo "%_tmppath /tmp" >> ~/.rpmmacros;
        echo "%__spec_install_post %{nil}" >> ~/.rpmmacros;
        echo "%_source_filedigest_algorithm 0" >> ~/.rpmmacros;
        echo "%_binary_filedigest_algorithm 0" >> ~/.rpmmacros;
        echo "%_build_id_links none" >> ~/.rpmmacros;
        echo "%_disable_source_fetch 1" >> ~/.rpmmacros;
        echo "%_allow_root_build 1" >> ~/.rpmmacros; 
        cat ~/.rpmmacros;
        echo "rpmmacros настроен";
      fi
    
    # Передаем версию в Makefile
    - make -C driver $MAKE_TARGET MODULE_VERSION="$MODULE_VERSION" BUILD_NUM="$BUILD_NUMBER"
    
    # Забираем готовый пакет
    - mkdir -p build/packages/$OS_NAME
    - mv build/*.$PKG_EXT build/packages/$OS_NAME/ 2>/dev/null || true
  needs:
    - job: build
      artifacts: true
  artifacts:
    paths:
      - build/packages/
    expire_in: 2 weeks

test:
  stage: test
  extends: 
    - .env_template
    - .os_matrix
  script:
    - export TARGET_OS="$OS_NAME"
    
    # 1. Поиск пакета
    - PKG_FILE=$(find build/packages/$OS_NAME -name "*.$PKG_EXT" | head -n 1)
    - "[ -z \"$PKG_FILE\" ] && exit 1"
    
    # 2. Проверка целостности пакета
    - echo "🔍 Проверка целостности пакета для $OS_NAME..."
    - $PKG_INFO_CMD $PKG_FILE
    - $PKG_LIST_CMD $PKG_FILE
    
    # 3. Валидация модуля через modinfo
    - KO_FILE=$(find build/ -name "accord-le.ko" | head -n 1)
    - echo "🔍 Проверка метаданных драйвера под $OS_NAME..."
    - modinfo $KO_FILE | grep -q "vermagic"
    
    # 4. ЗАГЛУШКИ: Обезвреживание бинарников для всех RPM-систем (ALT и РЕД ОС)
    - if [ "$PKG_EXT" = "rpm" ]; then
        echo "🔧 Обезвреживание systemctl и udevadm в системных директориях...";
        for path in /sbin/udevadm /usr/sbin/udevadm /bin/udevadm /usr/bin/udevadm /bin/systemctl /usr/bin/systemctl /sbin/systemctl /usr/sbin/systemctl; do
          mkdir -p $(dirname "$path");
          printf '#!/bin/sh\nexit 0\n' > "$path";
          chmod +x "$path";
        done;
      fi
    
    # 5. Тестовая установка пакета под нужный пакетный менеджер
    - |
      if command -v apt-get >/dev/null 2>&1; then
        apt-get install -fy ./$PKG_FILE
      elif command -v dnf >/dev/null 2>&1; then
        dnf localinstall -y ./$PKG_FILE
      elif command -v yum >/dev/null 2>&1; then
        yum localinstall -y ./$PKG_FILE
      else
        rpm -i ./$PKG_FILE
      fi
    
    - echo "✅ Пакет под $OS_NAME успешно прошел все проверки!"
  needs:
    - job: build
      artifacts: true
    - job: package
      artifacts: true

release-artifacts:
  stage: release
  image: "debian:12"
  script:
    - echo "🚀 Все пакеты успешно собраны и протестированы!"
    - echo "Список готовых файлов (.deb и .rpm):"
    - find build/packages/ -type f
  needs:
    - job: test
    - job: package
      artifacts: true