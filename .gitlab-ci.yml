stages:
  - validate
  - build
  - package
  - test
  - release

variables:
  # Передаем параметры согласно вашему Makefile
  OUTPUT_DIR: "$CI_PROJECT_DIR/build"
  BUILD_NUMBER: "$CI_PIPELINE_IID"

# ---------------------------------------------------------
# ТЗ п. 3.4: Расширенная матрица ОС
# ---------------------------------------------------------
.os_matrix:
  parallel:
    matrix:
      - OS_NAME: "ubuntu"
        OS_IMAGE: "ubuntu:20.04"
        HEADERS_PKG: "linux-headers-generic"
        PKG_EXT: "deb"
        EXTRA_PKGS: ""
      # - OS_NAME: "ubuntu"
      #   OS_IMAGE: "ubuntu:22.04"
      #   HEADERS_PKG: "linux-headers-generic"
      #   PKG_EXT: "deb"
      #   EXTRA_PKGS: ""
      # - OS_NAME: "ubuntu"
      #   OS_IMAGE: "ubuntu:24.04"
      #   HEADERS_PKG: "linux-headers-generic"
      #   PKG_EXT: "deb"
      #   EXTRA_PKGS: ""
      # - OS_NAME: "debian"
      #   OS_IMAGE: "debian:11"
      #   HEADERS_PKG: "linux-headers-amd64"
      #   PKG_EXT: "deb"
      #   EXTRA_PKGS: ""
      # - OS_NAME: "debian"
      #   OS_IMAGE: "debian:12"
      #   HEADERS_PKG: "linux-headers-amd64"
      #   PKG_EXT: "deb"
      #   EXTRA_PKGS: ""
      # - OS_NAME: "astra"
      #   OS_IMAGE: "registry.astralinux.ru/library/astra/ubi18:latest"
      #   HEADERS_PKG: "linux-headers-hardened-amd64"
      #   PKG_EXT: "deb"
      #   EXTRA_PKGS: ""
      # - OS_NAME: "alt"
      #   OS_IMAGE: "alt:p10" # Проксируем для ALT Linux 10C
      #   HEADERS_PKG: "kernel-headers-modules-std-def"
      #   PKG_EXT: "rpm"
      #   EXTRA_PKGS: "rpm-build"
      # - OS_NAME: "redos"
      #   OS_IMAGE: "registry.red-soft.ru/ubi7/ubi:latest"
      #   HEADERS_PKG: "kernel-devel"
      #   PKG_EXT: "rpm"
      #   EXTRA_PKGS: "rpm-build gcc make dpkg"

# ---------------------------------------------------------
# Универсальный скрипт подготовки окружения
# ---------------------------------------------------------
.env_template:
  image: $OS_IMAGE
  before_script:
    - export TARGET_OS="$OS_NAME"
    - export TARGET_ARCH=$(uname -m)
    
    # Адаптивная установка зависимостей (apt / dnf / yum)
    - |
      if command -v apt-get >/dev/null 2>&1; then
        export DEBIAN_FRONTEND=noninteractive
        apt-get update -yqq
        if [ -n "$HEADERS_PKG" ] && ! apt-cache show "$HEADERS_PKG" >/dev/null 2>&1; then
          FOUND_PKG=$(apt-cache search "^linux-headers-" | grep -E "hardened|generic|amd64|astra" | head -n 1 | awk '{print $1}');
          [ -n "$FOUND_PKG" ] && HEADERS_PKG="$FOUND_PKG";
        fi
        apt-get install -yqq build-essential sudo git kmod udev rpm $HEADERS_PKG $EXTRA_PKGS
      elif command -v dnf >/dev/null 2>&1; then
        dnf update -y || true
        dnf install -y gcc gcc-c++ make sudo git kmod udev rpm-build $HEADERS_PKG $EXTRA_PKGS
      elif command -v yum >/dev/null 2>&1; then
        yum update -y || true
        yum install -y gcc gcc-c++ make sudo git kmod udev rpm-build $HEADERS_PKG $EXTRA_PKGS
      fi
      
    # Поиск заголовков ядра (универсальный)
    - |
      export KERNEL_HEADERS=$(find /lib/modules -type l -name build 2>/dev/null | head -n 1)
      if [ -z "$KERNEL_HEADERS" ]; then
        export KERNEL_HEADERS=$(find /usr/src/kernels -mindepth 1 -maxdepth 1 -type d 2>/dev/null | head -n 1)
      fi
      if [ -z "$KERNEL_HEADERS" ]; then
        export KERNEL_HEADERS=$(find /usr/src -maxdepth 1 -type d -name "linux-headers-*" 2>/dev/null | grep -v "common" | head -n 1)
      fi

# ---------------------------------------------------------
# Этапы CI/CD (ТЗ п. 4.3)
# ---------------------------------------------------------

validate-build-system:
  stage: validate
  extends: 
    - .env_template
    - .os_matrix
  script:
    - make help

build:
  stage: build
  extends: 
    - .env_template
    - .os_matrix
  script:
    # Makefile сам подтянет TARGET_OS, OUTPUT_DIR и KERNEL_HEADERS из окружения
    - make ci-build
  artifacts:
    paths:
      - build/
    expire_in: 1 week

package:
  stage: package
  extends: 
    - .env_template
    - .os_matrix
  script:
    - if [ "$PKG_EXT" = "rpm" ]; then
        echo "🔧 Настройка rpmbuild...";
        echo "%_topdir $(pwd)/build/rpm" > ~/.rpmmacros;
        echo "%_tmppath /tmp" >> ~/.rpmmacros;
        echo "%__spec_install_post %{nil}" >> ~/.rpmmacros;
        echo "%_disable_source_fetch 1" >> ~/.rpmmacros;
        echo "%_allow_root_build 1" >> ~/.rpmmacros; 
      fi
    - make ci-package
  needs:
    - job: build
      artifacts: true
  artifacts:
    paths:
      - build/packages/
    expire_in: 2 weeks

test:
  stage: test
  extends: 
    - .env_template
    - .os_matrix
  script:
    # 1. Поиск пакета драйвера (исключаем утилиты tools)
    - PKG_FILE=$(find build/packages/$OS_NAME -name "*.$PKG_EXT" | grep -iv "tools" | head -n 1)
    - echo "🔍 Найден пакет  $PKG_FILE"
    - "[ -z \"$PKG_FILE\" ] && echo '❌ Пакет драйвера не найден в build/packages/$OS_NAME' && exit 1"

    # 2. Динамическое определение имени пакета
    - |
      if [ "$PKG_EXT" = "deb" ]; then
        PKG_NAME=$(dpkg-deb -f $PKG_FILE Package)
      else
        PKG_NAME=$(rpm -qp --queryformat '%{NAME}' $PKG_FILE 2>/dev/null)
      fi
    - echo "📦 Имя пакета $PKG_NAME"

    # 3. ТЗ п. 8: Установка пакета (без маскировки ошибок)
    - echo "📥 Установка пакета..."
    - |
      if command -v apt-get >/dev/null 2>&1; then
        dpkg -i $PKG_FILE
        apt-get install -f -y
      elif command -v dnf >/dev/null 2>&1; then
        dnf localinstall -y $PKG_FILE
      elif command -v yum >/dev/null 2>&1; then
        yum localinstall -y $PKG_FILE
      else
        rpm -i $PKG_FILE
      fi

    # 4. Поиск модуля драйвера
    - echo "🔍 Поиск модуля accord-le.ko..."
    - KO_FILE=$(find /lib/modules -name "accord-le.ko" 2>/dev/null | head -n 1)
    - if [ -z "$KO_FILE" ]; then
        echo "❌ Модуль accord-le.ko не найден в /lib/modules!";
        echo "📂 Содержимое /lib/modules:";
        find /lib/modules -name "*.ko" 2>/dev/null | head -20;
        exit 1;
      fi
    - echo "✅ Модуль найден $KO_FILE"

    # 5. ТЗ п. 8: Загрузка драйвера (требует privileged mode)
    - echo "️ Загрузка драйвера..."
    - |
      if [ -w /dev/kmsg ]; then
        echo "🔌 privileged mode обнаружен, загружаем модуль...";
        if insmod $KO_FILE; then
          echo "✅ Модуль успешно загружен через insmod";
        else
          echo "❌ insmod завершился с ошибкой";
          dmesg | tail -20 || true;
          exit 1;
        fi
      else
        echo "⚠️ Нет доступа к /dev/kmsg (нет privileged mode)";
        echo "📝 Проверяем валидность модуля через modinfo...";
        if modinfo $KO_FILE | grep -q "vermagic"; then
          echo "✅ Модуль валиден (vermagic присутствует)";
        else
          echo "❌ Модуль не прошёл проверку modinfo";
          exit 1;
        fi
      fi

    # 6. ТЗ п. 8: Проверка загрузки модуля
    - echo "🔍 Проверка загрузки модуля..."
    - |
      if lsmod | grep -q "accord_le"; then
        echo "✅ Модуль accord_le активен в ядре";
      else
        echo "⚠️ Модуль не найден в lsmod (возможно, загружен под другим именем)";
        lsmod | grep -i "accord" || true;
      fi

    # 7. ТЗ п. 8: Выгрузка модуля
    - echo "🗑️ Выгрузка модуля..."
    - rmmod accord_le 2>/dev/null || rmmod accord-le 2>/dev/null || echo "⚠️ Модуль не был загружен"

    # 8. ТЗ п. 8: Удаление пакета (используем динамическое имя)
    - echo "🗑️ Удаление пакета $PKG_NAME..."
    - |
      if command -v apt-get >/dev/null 2>&1; then
        apt-get remove -y $PKG_NAME
      elif command -v dnf >/dev/null 2>&1; then
        dnf remove -y $PKG_NAME
      elif command -v yum >/dev/null 2>&1; then
        yum remove -y $PKG_NAME
      else
        rpm -e $PKG_NAME
      fi

    - echo "✅ Тесты для $OS_NAME успешно пройдены!"
  needs:
    - job: package
      artifacts: true



release-artifacts:
  stage: release
  image: "debian:12"
  script:
    - echo "🚀 Релиз сформирован!"
    - echo "Структура артефактов (ТЗ п. 6.1):"
    - ls -R build/packages/
  needs:
    - job: test
    - job: package
      artifacts: true