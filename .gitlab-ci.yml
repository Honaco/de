stages:
  - validate
  - build
  - package
  - test
  - release

variables:
  OUTPUT_DIR: "$CI_PROJECT_DIR/build"
  BUILD_NUMBER: "$CI_PIPELINE_IID"
  # Автоматическое версионирование по ТЗ п. 7 (tag-buildN-ghash)
  MODULE_VERSION: "${CI_COMMIT_TAG:-1.0.0}-build${CI_PIPELINE_IID}-g${CI_COMMIT_SHORT_SHA}"

# Шаблон окружения для минимизации дублирования конфигурации (ТЗ п. 4.2, п. 9)
.env_template:
  before_script:
    - export DEBIAN_FRONTEND=noninteractive
    - |
      if [ -f /etc/debian_version ]; then
        # Для Ubuntu, Debian, Astra Linux
        apt-get update -yqq
        apt-get install -yqq build-essential sudo git linux-headers-generic rpm kmod udev
      elif [ -f /etc/altlinux-release ]; then
        # Для ALT Linux (использует APT-RPM)
        apt-get update -yqq
        apt-get install -yqq rpm-build kernel-build-tools sudo git kmod udev
      else
        echo "⚠️ Неизвестный дистрибутив, пытаемся использовать базовые команды"
      fi

# Общий список платформ (ТЗ п. 3.4)
.platforms: &platforms
  - OS_IMAGE: [
      "ubuntu:20.04",
      "ubuntu:22.04",
      "ubuntu:24.04",
      "debian:11",
      "debian:12",
      "astralinux:latest",
      "altlinux:p10"
    ]

# --- Этап 1: VALIDATE (ТЗ п. 4.3) ---
validate-build-system:
  stage: validate
  image: ubuntu:22.04
  script:
    - echo "🔍 Проверка доступности целей Makefile..."
    - make help

# --- Этап 2: BUILD (ТЗ п. 4.3) ---
build:matrix:
  extends: .env_template
  stage: build
  parallel:
    matrix:
      - OS_IMAGE: [
          "ubuntu:20.04",
          "ubuntu:22.04",
          "ubuntu:24.04",
          "debian:11",
          "debian:12",
          "astralinux:latest",
          "altlinux:p10"
        ]
  image: $OS_IMAGE
  script:
    - export TARGET_ARCH=$(uname -m)
    - export TARGET_OS=$(awk -F= '/^ID=/ {print $2}' /etc/os-release | tr -d '"' || echo "debian")
    # Универсальный поиск kernel headers (ТЗ п. 3.5: generic, LTS, vendor, custom)
    - export KERNEL_HEADERS_DIR=$(ls -d /usr/src/linux-headers-* 2>/dev/null | grep -v "common" | head -n 1)
    - if [ -z "$KERNEL_HEADERS_DIR" ]; then
        echo "⚠️ Пакетные kernel headers не найдены, используется путь по умолчанию";
        export KERNEL_HEADERS_DIR="/lib/modules/$(uname -r)/build";
      fi
    - export KERNEL_HEADERS="$KERNEL_HEADERS_DIR"
    - export TARGET_OS="$TARGET_OS"
    - export TARGET_ARCH="$TARGET_ARCH"
    - export MODULE_VERSION="$MODULE_VERSION"
    - export BUILD_NUMBER="$BUILD_NUMBER"
    - export OUTPUT_DIR="$OUTPUT_DIR"
    - make ci-build
  artifacts:
    name: "accord-le-build-$OS_IMAGE-$CI_PIPELINE_IID"
    paths:
      - build/
      - driver/
      - tools/
    expire_in: 1 week

# --- Этап 3: PACKAGE (ТЗ п. 4.3, п. 5) ---
package:matrix:
  extends: .env_template
  stage: package
  parallel:
    matrix:
      - OS_IMAGE: [
          "ubuntu:20.04",
          "ubuntu:22.04",
          "ubuntu:24.04",
          "debian:11",
          "debian:12",
          "astralinux:latest",
          "altlinux:p10"
        ]
  image: $OS_IMAGE
  script:
    - export TARGET_ARCH=$(uname -m)
    - export TARGET_OS=$(awk -F= '/^ID=/ {print $2}' /etc/os-release | tr -d '"' || echo "debian")
    - export MODULE_VERSION="$MODULE_VERSION"
    - export BUILD_NUMBER="$BUILD_NUMBER"
    - export OUTPUT_DIR="$OUTPUT_DIR"
    - make ci-package
  needs:
    - job: build:matrix
      artifacts: true
  artifacts:
    name: "accord-le-packages-$OS_IMAGE-$CI_PIPELINE_IID"
    paths:
      - build/packages/
    expire_in: 2 weeks

# --- Этап 4: TEST (ТЗ п. 4.3 и п. 8 "Автоматизация тестирования пакетов") ---
test:matrix:
  extends: .env_template
  stage: test
  parallel:
    matrix:
      - OS_IMAGE: [
          "ubuntu:20.04",
          "ubuntu:22.04",
          "ubuntu:24.04",
          "debian:11",
          "debian:12",
          "astralinux:latest",
          "altlinux:p10"
        ]
  image: $OS_IMAGE
  script:
    - export TARGET_OS=$(awk -F= '/^ID=/ {print $2}' /etc/os-release | tr -d '"' || echo "debian")
    - echo "🧪 Запуск автоматических тестов качества пакетов для $TARGET_OS..."
    # Поиск пакетов (DEB и RPM)
    - DEB_FILE=$(find build/packages/$TARGET_OS -name "*.deb" 2>/dev/null | head -n 1)
    - RPM_FILE=$(find build/packages/$TARGET_OS -name "*.rpm" 2>/dev/null | head -n 1)
    # 1. Установка пакета (ТЗ п. 8)
    - if [ -n "$DEB_FILE" ]; then
        echo " Установка DEB пакета $DEB_FILE";
        sudo dpkg -i $DEB_FILE;
        sudo apt-get install -f -y;
      elif [ -n "$RPM_FILE" ]; then
        echo "📥 Установка RPM пакета $RPM_FILE";
        sudo rpm -i $RPM_FILE;
      else
        echo "️ Пакет для тестирования не найден.";
        exit 1;
      fi
    # 2. Загрузка драйвера (ТЗ п. 8)
    - echo "🔍 Загрузка драйвера accord-le..."
    - sudo modprobe accord-le || sudo insmod /lib/modules/$(uname -r)/extra/accord-le.ko
    # 3. Проверка загрузки модуля (ТЗ п. 8)
    - echo " Проверка загрузки модуля..."
    - lsmod | grep accord-le
    - echo "✅ Модуль accord-le успешно загружен"
    # 4. Удаление пакета (ТЗ п. 8)
    - echo "🗑️ Выгрузка драйвера..."
    - sudo modprobe -r accord-le || true
    - if [ -n "$DEB_FILE" ]; then
        echo "️ Удаление DEB пакета...";
        sudo apt-get remove -y accord-le-driver;
      elif [ -n "$RPM_FILE" ]; then
        echo "🗑️ Удаление RPM пакета...";
        sudo rpm -e accord-le-driver;
      fi
    - echo "✅ Тесты для $TARGET_OS успешно пройдены!"
  needs:
    - job: package:matrix
      artifacts: true

# --- Этап 5: RELEASE (ТЗ п. 4.3) ---
release-artifacts:
  stage: release
  image: ubuntu:22.04
  script:
    - echo "🚀 Все тесты пройдены. Формирование финального релизного хранилища..."
    - echo "📂 Доступные пакеты готовые к дистрибуции:"
    - ls -R build/packages/
  needs:
    - job: test:matrix
    - job: package:matrix
      artifacts: true
  artifacts:
    name: "accord-le-final-dist-$CI_PIPELINE_IID"
    paths:
      - build/packages/
    expire_in: 4 weeks