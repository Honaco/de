stages:
  - validate
  - build
  - package
  - test
  - release

# ============================================
# ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
# ============================================

variables:
  GIT_DEPTH: 20
  GIT_STRATEGY: clone

# ============================================
# ШАБЛОНЫ (исправлены!)
# ============================================

.default-before: &default-before
  - echo "🔧 Настройка Git..."
  # Используем host.docker.internal для доступа к хосту
  - git remote set-url origin http://host.docker.internal:8000/root/33.git
  # Или используйте IP: http://192.168.1.100:8000/root/33.git
  - git config --global --add safe.directory "$CI_PROJECT_DIR"
  - echo "✅ Git настроен"

.ubuntu-template: &ubuntu-template
  before_script: *default-before
  script:
    - echo "🔨 Сборка для Ubuntu..."
    - apt update -qq
    - apt install -y -qq build-essential make gcc linux-headers-$(uname -r)
    - export KERNEL_RELEASE=$(uname -r)
    - make build
    - make package

.debian-template: &debian-template
  before_script: *default-before
  script:
    - echo "🔨 Сборка для Debian..."
    - apt update -qq
    - apt install -y -qq build-essential make gcc linux-headers-$(uname -r)
    - export KERNEL_RELEASE=$(uname -r)
    - make build
    - make package

.alt-template: &alt-template
  before_script: *default-before
  script:
    - echo "🔨 Сборка для ALT Linux..."
    - apt-get update -qq
    - apt-get install -y -qq make gcc kernel-headers
    - make build
    - make package-rpm

# ============================================
# 1. VALIDATE
# ============================================

validate:
  stage: validate
  image: debian:12
  before_script: *default-before
  script:
    - apt update -qq
    - apt install -y -qq make gcc
    - echo "🔍 Проверка Makefile..."
    - make -n build 2>/dev/null || true
    - echo "✅ Валидация пройдена"

# ============================================
# 2. BUILD
# ============================================

build-ubuntu-20.04:
  stage: build
  image: ubuntu:20.04
  <<: *ubuntu-template
  artifacts:
    paths:
      - build/
      - driver/accord-le.ko
    expire_in: 1 day

build-ubuntu-22.04:
  stage: build
  image: ubuntu:22.04
  <<: *ubuntu-template
  artifacts:
    paths:
      - build/
      - driver/accord-le.ko
    expire_in: 1 day

build-ubuntu-24.04:
  stage: build
  image: ubuntu:24.04
  <<: *ubuntu-template
  artifacts:
    paths:
      - build/
      - driver/accord-le.ko
    expire_in: 1 day
  allow_failure: true

build-debian-11:
  stage: build
  image: debian:11
  <<: *debian-template
  artifacts:
    paths:
      - build/
      - driver/accord-le.ko
    expire_in: 1 day

build-debian-12:
  stage: build
  image: debian:12
  <<: *debian-template
  artifacts:
    paths:
      - build/
      - driver/accord-le.ko
    expire_in: 1 day

build-alt-linux:
  stage: build
  image: altlinux/p10
  <<: *alt-template
  artifacts:
    paths:
      - build/
    expire_in: 1 day
  allow_failure: true

# ============================================
# 3. PACKAGE
# ============================================

package:
  stage: package
  image: debian:12
  before_script: *default-before
  dependencies:
    - build-debian-12
  script:
    - echo "📦 Упаковка..."
    - apt update -qq
    - apt install -y -qq dpkg-dev rpm file
    - make package
    - ls -lh build/
  artifacts:
    paths:
      - build/*.deb
      - build/*.rpm
      - build/*.tar.gz
    expire_in: 1 week

# ============================================
# 4. TEST
# ============================================

test:
  stage: test
  image: debian:12
  before_script: *default-before
  dependencies:
    - package
  script:
    - echo "🧪 Тестирование..."
    - apt update -qq
    - apt install -y -qq kmod udev dpkg
    - make test
  only:
    - main
    - merge_requests

# ============================================
# 5. RELEASE
# ============================================

release:
  stage: release
  image: debian:12
  before_script: *default-before
  dependencies:
    - package
  script:
    - echo "🚀 Создание релиза..."
    - export VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "1.0.0")
    - export BUILD=${CI_PIPELINE_IID}
    - export HASH=$(git rev-parse --short HEAD)
    - export FULL_VERSION="${VERSION}-build${BUILD}-g${HASH}"
    - echo "📌 Версия: $FULL_VERSION"
    - mkdir -p release/
    - cp build/* release/ 2>/dev/null || true
    - cd release && tar -czf accord-le-${FULL_VERSION}-release.tar.gz *
    - ls -lh release/
  artifacts:
    paths:
      - release/
    expire_in: 30 days
  only:
    - tags
    - main
  when: manual