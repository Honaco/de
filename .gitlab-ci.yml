# ==========================================
# GitLab CI/CD Pipeline для Accord-LE
# ТЗ п. 4, 5, 6, 7, 8
# ==========================================

stages:
  - validate
  - build
  - package
  - test
  - release

# ==========================================
# Глобальные переменные
# ==========================================
variables:
  MODULE_VERSION: "$CI_COMMIT_TAG"
  BUILD_NUM: "$CI_PIPELINE_IID"
  GIT_DEPTH: "20"

# ==========================================
# Reusable Templates (ТЗ п. 4.2)
# ==========================================

# Шаблон для DEB-платформ
.build-deb-template:
  stage: build
  image: debian:12
  before_script:
    - apt update
    - apt install -y git build-essential make
    - git remote set-url origin http://localhost/root/33.git
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
  script:
    - make ci-build MODULE_VERSION=${MODULE_VERSION:-1.0.0} BUILD_NUM=$BUILD_NUM
  artifacts:
    paths:
      - build/
    expire_in: 1 week

# Шаблон для RPM-платформ
.build-rpm-template:
  stage: build
  image: rockylinux:9
  before_script:
    - dnf install -y epel-release git make gcc
    - git remote set-url origin http://localhost/root/33.git
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
  script:
    - make ci-build MODULE_VERSION=${MODULE_VERSION:-1.0.0} BUILD_NUM=$BUILD_NUM
  artifacts:
    paths:
      - build/
    expire_in: 1 week

# Шаблон упаковки DEB
.package-deb-template:
  stage: package
  image: debian:12
  before_script:
    - apt update
    - apt install -y git dpkg-dev make
    - git remote set-url origin http://localhost/root/33.git
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
  script:
    - make ci-package MODULE_VERSION=${MODULE_VERSION:-1.0.0} BUILD_NUM=$BUILD_NUM
  artifacts:
    paths:
      - build/*.deb
      - build/*.tar.gz
    expire_in: 1 week

# Шаблон упаковки RPM
.package-rpm-template:
  stage: package
  image: rockylinux:9
  before_script:
    - dnf install -y epel-release git rpm-build make
    - git remote set-url origin http://localhost/root/33.git
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
  script:
    - make ci-package MODULE_VERSION=${MODULE_VERSION:-1.0.0} BUILD_NUM=$BUILD_NUM
  artifacts:
    paths:
      - build/*.rpm
      - build/*.tar.gz
    expire_in: 1 week

# Шаблон тестирования
.test-template:
  stage: test
  image: debian:12
  before_script:
    - apt update
    - apt install -y git make
    - git remote set-url origin http://localhost/root/33.git
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
  script:
    - make ci-test MODULE_VERSION=${MODULE_VERSION:-1.0.0} BUILD_NUM=$BUILD_NUM
  artifacts:
    paths:
      - build/logs/
    expire_in: 1 week
  when: always

# ==========================================
# Валидация
# ==========================================
validate-config:
  stage: validate
  image: alpine:latest
  before_script:
    - apk add --no-cache git make
  script:
    - echo "🔍 Валидация конфигурации..."
    - make help
    - echo "✅ Конфигурация валидна"

# ==========================================
# Build Matrix (ТЗ п. 4.2)
# ==========================================

# ===== DEB платформы =====
build-ubuntu-20.04:
  extends: .build-deb-template
  image: ubuntu:20.04
  variables:
    DISTRO: "ubuntu-20.04"
  before_script:
    - apt update
    - apt install -y git build-essential make
    - git remote set-url origin http://localhost/root/33.git
    - git config --global --add safe.directory "$CI_PROJECT_DIR"

build-ubuntu-22.04:
  extends: .build-deb-template
  image: ubuntu:22.04
  variables:
    DISTRO: "ubuntu-22.04"
  before_script:
    - apt update
    - apt install -y git build-essential make
    - git remote set-url origin http://localhost/root/33.git
    - git config --global --add safe.directory "$CI_PROJECT_DIR"

build-debian-11:
  extends: .build-deb-template
  image: debian:11
  variables:
    DISTRO: "debian-11"
  before_script:
    - apt update
    - apt install -y git build-essential make
    - git remote set-url origin http://localhost/root/33.git
    - git config --global --add safe.directory "$CI_PROJECT_DIR"

build-debian-12:
  extends: .build-deb-template
  image: debian:12
  variables:
    DISTRO: "debian-12"
  before_script:
    - apt update
    - apt install -y git build-essential make
    - git remote set-url origin http://localhost/root/33.git
    - git config --global --add safe.directory "$CI_PROJECT_DIR"

# ===== RPM платформы =====
build-alt-linux:
  extends: .build-rpm-template
  image: altlinux/p10
  variables:
    DISTRO: "alt-linux-p10"
  before_script:
    - apt-get update
    - apt-get install -y git make gcc
    - git remote set-url origin http://localhost/root/33.git
    - git config --global --add safe.directory "$CI_PROJECT_DIR"

build-rockylinux-9:
  extends: .build-rpm-template
  variables:
    DISTRO: "rockylinux-9"
  before_script:
    - dnf install -y epel-release git make gcc
    - git remote set-url origin http://localhost/root/33.git
    - git config --global --add safe.directory "$CI_PROJECT_DIR"

# ==========================================
# Упаковка (ТЗ п. 5, 6)
# ==========================================

package-debian-12:
  extends: .package-deb-template
  needs: ["build-debian-12"]
  variables:
    DISTRO: "debian-12"

package-ubuntu-22.04:
  extends: .package-deb-template
  needs: ["build-ubuntu-22.04"]
  variables:
    DISTRO: "ubuntu-22.04"

package-alt-linux:
  extends: .package-rpm-template
  needs: ["build-alt-linux"]
  variables:
    DISTRO: "alt-linux"

# ==========================================
# Тестирование (ТЗ п. 8)
# ==========================================

test-debian-12:
  extends: .test-template
  needs: ["package-debian-12"]
  variables:
    DISTRO: "debian-12"

test-ubuntu-22.04:
  extends: .test-template
  needs: ["package-ubuntu-22.04"]
  variables:
    DISTRO: "ubuntu-22.04"

# ==========================================
# Release (ТЗ п. 7)
# ==========================================
release:
  stage: release
  image: alpine:latest
  before_script:
    - apk add --no-cache curl jq
  script:
    - echo "📦 Создание релиза ${CI_COMMIT_TAG:-$MODULE_VERSION}"
    - echo "✅ Релиз создан"
  artifacts:
    paths:
      - build/*.deb
      - build/*.rpm
      - build/*.tar.gz
    expire_in: 1 month
  rules:
    - if: $CI_COMMIT_TAG

# ==========================================
# Правила запуска (ТЗ п. 4.2)
# ==========================================
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG