stages:
  - build

# Шаблон для переиспользования (ТЗ п. 4.2)
.build_template:
  stage: build
  image: $DOCKER_IMAGE
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq make gcc kmod $HEADERS_PKG
    # Находим путь к заголовкам
    - export KERNEL_HEADERS_DIR=$(ls -d /usr/src/linux-headers-* | head -1)
    - echo "Using kernel headers: $KERNEL_HEADERS_DIR"
  script:
    - make ci-build TARGET_OS=$TARGET_OS KERNEL_HEADERS=$KERNEL_HEADERS_DIR
  artifacts:
    paths:
      - build/
    expire_in: 1 week
    
# Джоба для Debian 12
build:debian12:
  extends: .build_template
  variables:
    DOCKER_IMAGE: debian:12
    TARGET_OS: debian
    HEADERS_PKG: linux-headers-amd64

# Джоба для Ubuntu 20.04
build:ubuntu2004:
  extends: .build_template
  variables:
    DOCKER_IMAGE: ubuntu:20.04
    TARGET_OS: ubuntu
    HEADERS_PKG: linux-headers-generic