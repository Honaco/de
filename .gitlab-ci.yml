stages:
  - build
  - package

variables:
  OUTPUT_DIR: "$CI_PROJECT_DIR/build"
  BUILD_NUM: "$CI_PIPELINE_IID"
  MODULE_VERSION: "${CI_COMMIT_TAG:-1.0.0}-build${CI_PIPELINE_IID}-g${CI_COMMIT_SHORT_SHA}"

.build_template:
  stage: build
  script:
      - export TARGET_ARCH=$(uname -m)
      - export TARGET_OS=$(grep -oP '(?<=^ID=).+' /etc/os-release | tr -d '"' || echo "debian")
      - export KERNEL_HEADERS_DIR=$(ls -d /usr/src/linux-headers-*-generic 2>/dev/null | head -n 1 || ls -d /usr/src/linux-headers-* 2>/dev/null | grep -v "common" | head -n 1)
      
      - export KERNEL_HEADERS="$KERNEL_HEADERS_DIR"
      - export TARGET_OS="$TARGET_OS"
      - export TARGET_ARCH="$TARGET_ARCH"
      - export MODULE_VERSION="$MODULE_VERSION"
      - export BUILD_NUM="$BUILD_NUM"
      - export OUTPUT_DIR="$OUTPUT_DIR"
      
      - make ci-build
  artifacts:
    name: "accord-le-$CI_JOB_NAME-$CI_PIPELINE_IID"
    paths:
      - build/
      - driver/       # Передаем состояние папки драйвера для этапа package
      - tools/        # Передаем скомпилированные утилиты, чтобы пакеты не были пустыми
    expire_in: 1 week
  
.env_template:
  before_script:
    - apt-get update -yqq
    - apt-get install -yqq build-essential sudo git linux-headers-generic rpm

# Матрица сборки для разных дистрибутивов
build:matrix:
  extends: .build_template
  parallel:
    matrix:
      - OS_IMAGE: ["ubuntu:20.04", "ubuntu:22.04", "ubuntu:24.04", "debian:11", "debian:12"]
  image: $OS_IMAGE
  before_script:
    - apt-get update -yqq
    # Ставим sudo (он нужен твоим под-макефайлам) и заголовки
    - apt-get install -yqq build-essential sudo git linux-headers-generic
    
package:
  extends: .env_template
  stage: package
  image: ubuntu:22.04
  script:
    # Теперь ci-package сам всё найдёт в driver/ и tools/ и разложит по местам
    - make ci-package
  needs:
    - job: build:matrix
      artifacts: true
  artifacts:
    name: "accord-le-packages-$CI_PIPELINE_IID"
    paths:
      - build/packages/
    expire_in: 2 weeks