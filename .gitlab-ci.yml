stages:
  - build
  - package
  - test

# Матрица сборок для разных дистрибутивов
build-ubuntu-20.04:
  stage: build
  image: ubuntu:20.04
  script:
    - apt update && apt install -y build-essential linux-headers-generic
    - make build
    - make package
  artifacts:
    paths:
      - build/

build-ubuntu-22.04:
  stage: build
  image: ubuntu:22.04
  script:
    - apt update && apt install -y build-essential linux-headers-generic
    - make build
    - make package

build-debian-11:
  stage: build
  image: debian:11
  script:
    - apt update && apt install -y build-essential linux-headers-amd64
    - make build
    - make package

build-debian-12:
  stage: build
  image: debian:12
  script:
    - apt update && apt install -y build-essential linux-headers-amd64
    - make build
    - make package

# Для RPM-дистрибутивов
build-alt-linux:
  stage: build
  image: altlinux/p10
  script:
    - apt-get update && apt-get install -y make gcc kernel-headers
    - make build
    - make package-rpm