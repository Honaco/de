stages:
  - build

variables:
  OUTPUT_DIR: "$CI_PROJECT_DIR/build"
  BUILD_NUM: "$CI_PIPELINE_IID"
  MODULE_VERSION: "${CI_COMMIT_TAG:-1.0.0}-build${CI_PIPELINE_IID}-g${CI_COMMIT_SHORT_SHA}"

.build_template:
  stage: build
  script:
    # 1. Динамически определяем ОС и архитектуру прямо внутри контейнера
    - export TARGET_ARCH=$(uname -m)
    - export TARGET_OS=$(grep -oP '(?<=^ID=).+' /etc/os-release | tr -d '"' || echo "debian")
    
    # 2. Находим точный путь к заголовкам ядра, которые только что установил apt
    - export KERNEL_HEADERS_DIR=$(ls -d /usr/src/linux-headers-*-generic 2>/dev/null | head -n 1 || ls -d /usr/src/linux-headers-* 2>/dev/null | grep -v "common" | head -n 1)
    
    - echo "Начинаем сборку для ОС $TARGET_OS ($TARGET_ARCH)..."
    - echo "Используем заголовки ядра из $KERNEL_HEADERS_DIR"
    
    # 3. Передаем все параметры строго через явный перенос строк с символом '\'
    - make ci-build \
        KERNEL_HEADERS="$KERNEL_HEADERS_DIR" \
        TARGET_OS="$TARGET_OS" \
        TARGET_ARCH="$TARGET_ARCH" \
        MODULE_VERSION="$MODULE_VERSION" \
        BUILD_NUM="$BUILD_NUM" \
        OUTPUT_DIR="$OUTPUT_DIR"
  artifacts:
    name: "accord-le-$CI_JOB_NAME-$CI_PIPELINE_IID"
    paths:
      - build/
    expire_in: 1 week

# Матрица сборки для разных дистрибутивов
build:matrix:
  extends: .build_template
  parallel:
    matrix:
      - OS_IMAGE: ["ubuntu:20.04", "ubuntu:22.04", "ubuntu:24.04", "debian:11", "debian:12"]
  image: $OS_IMAGE
  before_script:
    - apt-get update -yqq
    # Ставим sudo (он нужен твоим под-макефайлам) и заголовки
    - apt-get install -yqq build-essential sudo git linux-headers-generic