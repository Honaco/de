stages:
  - build
  - package
  - test

# Исправляем Git URL для всех job
.default-before: &default-before
  - git remote set-url origin http://localhost:8000/root/33.git
  - git config --global --add safe.directory "$CI_PROJECT_DIR"

# Матрица сборок для разных дистрибутивов
build-ubuntu-20.04:
  stage: build
  image: ubuntu:20.04
  before_script: *default-before
  script:
    - apt update && apt install -y build-essential linux-headers-generic
    - make build
    - make package
  artifacts:
    paths:
      - build/

build-ubuntu-22.04:
  stage: build
  image: ubuntu:22.04
  before_script: *default-before
  script:
    - apt update && apt install -y build-essential linux-headers-generic
    - make build
    - make package

build-debian-11:
  stage: build
  image: debian:11
  before_script: *default-before
  script:
    - apt update && apt install -y build-essential linux-headers-amd64
    - make build
    - make package

build-debian-12:
  stage: build
  image: debian:12
  before_script: *default-before
  script:
    - apt update && apt install -y build-essential linux-headers-amd64
    - make build
    - make package

# Для RPM-дистрибутивов
build-alt-linux:
  stage: build
  image: altlinux/p10
  before_script: *default-before
  script:
    - apt-get update && apt-get install -y make gcc kernel-headers
    - make build
    - make package-rpm