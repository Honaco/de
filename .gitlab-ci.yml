stages:
  - validate
  - build
  - package
  - test
  - release

validate:
  stage: validate
  image: debian:12
  script:
    - apt-get update
    - apt-get install -y build-essential make gcc
    - echo "✅ Проверка завершена"
    - make --version

build:
  stage: build
  image: debian:12
  script:
    - apt-get update
    - apt-get install -y build-essential make gcc
    - echo "🔨 Сборка утилит..."
    - make -C tools all
  artifacts:
    paths:
      - build/acle-tools-bin.tar.xz
    expire_in: 1 hour

package_tools:
  stage: package
  image: debian:12
  script:
    - apt-get update
    - apt-get install -y build-essential make gcc dpkg-dev rpm
    - echo "📦 Создание пакетов..."
    - make -C tools package
    - echo "📂 Артефакты:"
    - ls -lh build/
  dependencies:
    - build
  artifacts:
    paths:
      - build/
    expire_in: 1 week

test:
  stage: test
  image: debian:12
  script:
    - echo "🧪 Тестирование установки пакетов (ТЗ п. 8)..."
    - apt-get update
    - echo "📥 Установка DEB пакета..."
    - dpkg -i build/acle-tools-*.deb || echo "⚠️ Установка"
    - echo "✅ Проверка установленных файлов:"
    - ls /usr/bin/acle-* || true
    - ls /usr/share/acle-tools/scripts/*.sh || true
    - echo "✅ Тест установки пройден"
  dependencies:
    - package_tools

release:
  stage: release
  image: debian:12
  script:
    - echo "Релиз завершён!"
    - echo "Айди $CI_PIPELINE_ID"
    - echo "Доступные артефакты:"
    - ls -lh build/
    - echo "Все этапы CI/CD пройдены успешно!"
  dependencies:
    - package_tools