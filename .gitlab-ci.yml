stages:
  - validate
  - build
  - package
  - test
  - release

variables:
  OUTPUT_DIR: "$CI_PROJECT_DIR/build"
  BUILD_NUMBER: "$CI_PIPELINE_IID"
  MODULE_VERSION: "${CI_COMMIT_TAG:-1.0.0}-build${CI_PIPELINE_IID}-g${CI_COMMIT_SHORT_SHA}"

# Расширенная матрица для сборки (теперь с ALT Linux)
.os_matrix:
  parallel:
    matrix:
      - OS_NAME: "debian"
        OS_IMAGE: "debian:12"
        HEADERS_PKG: "linux-headers-amd64"
        PKG_EXT: "deb"
        MAKE_TARGET: "package-deb"
        PKG_INFO_CMD: "dpkg-deb -I"
        PKG_LIST_CMD: "dpkg-deb -c"
        EXTRA_PKGS: ""
      - OS_NAME: "ubuntu"
        OS_IMAGE: "ubuntu:20.04"
        HEADERS_PKG: "linux-headers-generic"
        PKG_EXT: "deb"
        MAKE_TARGET: "package-deb"
        PKG_INFO_CMD: "dpkg-deb -I"
        PKG_LIST_CMD: "dpkg-deb -c"
        EXTRA_PKGS: ""
      - OS_NAME: "alt"
        OS_IMAGE: "alt:p10" # Можно заменить на alt:p11 или alt:sisyphus при необходимости
        HEADERS_PKG: "kernel-headers-modules-std-def"
        PKG_EXT: "rpm"
        MAKE_TARGET: "package-rpm"
        PKG_INFO_CMD: "rpm -qip"
        PKG_LIST_CMD: "rpm -qlp"
        EXTRA_PKGS: "rpm-build" # Для ALT необходима утилита сборки RPM

# Шаблон окружения
.env_template:
  image: $OS_IMAGE
  before_script:
    - export DEBIAN_FRONTEND=noninteractive
    - apt-get update -yqq
    - apt-get install -yqq build-essential sudo git $HEADERS_PKG rpm kmod udev $EXTRA_PKGS

validate-build-system:
  stage: validate
  extends: 
    - .env_template
    - .os_matrix
  script:
    - apt-get install -yqq make
    - make help

build:
  stage: build
  extends: 
    - .env_template
    - .os_matrix
  script:
    # Динамически находим симлинк build внутри контейнера конкретной ОС
    - export KERNEL_HEADERS=$(find /lib/modules -type l -name build | head -n 1)
    - echo "Используем заголовки ядра по пути $KERNEL_HEADERS для $OS_NAME"
    - export TARGET_OS="$OS_NAME"
    - export TARGET_ARCH=$(uname -m)
    - make ci-build
  artifacts:
    paths:
      - build/
      - driver/
      - tools/
    expire_in: 1 week

package:
  stage: package
  extends: 
    - .env_template
    - .os_matrix
  script:
    - export TARGET_OS="$OS_NAME"
    - export TARGET_ARCH=$(uname -m)
    
    # ИСПОЛЬЗУЕМ ПЕРЕМЕННУЮ МАТРИЦЫ: вызываем нужный таргет и передаем параметры версии
    - make $MAKE_TARGET MODULE_VERSION="$MODULE_VERSION" BUILD_NUM="$BUILD_NUMBER"
    
    # ИСПРАВЛЕНО: Забираем пакет из build/ и изолируем по папкам ОС
    - mkdir -p build/packages/$OS_NAME
    - mv build/*.$PKG_EXT build/packages/$OS_NAME/ 2>/dev/null || true
  needs:
    - job: build
      artifacts: true
  artifacts:
    paths:
      - build/packages/
    expire_in: 2 weeks

test:
  stage: test
  extends: 
    - .env_template
    - .os_matrix
  script:
    - export TARGET_OS="$OS_NAME"
    
    # 1. Поиск пакета с правильным расширением (.deb или .rpm)
    - PKG_FILE=$(find build/packages/$OS_NAME -name "*.$PKG_EXT" | head -n 1)
    - "[ -z \"$PKG_FILE\" ] && exit 1"
    
    # 2. Установка в "сухом режиме" с использованием правильной утилиты из матрицы
    - echo "🔍 Проверка целостности пакета для $OS_NAME..."
    - $PKG_INFO_CMD $PKG_FILE
    - $PKG_LIST_CMD $PKG_FILE
    
    # 3. Валидация модуля (исправлено: забираем артефакты из build и package)
    - KO_FILE=$(find build/ -name "accord-le.ko" | head -n 1)
    - echo "🔍 Проверка метаданных драйвера под $OS_NAME..."
    - modinfo $KO_FILE | grep -q "vermagic"
    
    # 4. Тестовая установка пакета в текущее окружение ОС
    # Команда работает одинаково для оригинального APT и для APT-RPM в ALT Linux
    - apt-get install -fy ./$PKG_FILE
    
    - echo "✅ Пакет под $OS_NAME успешно прошел все проверки!"
  needs:
    - job: build
      artifacts: true
    - job: package
      artifacts: true

release-artifacts:
  stage: release
  image: "debian:12"
  script:
    - echo "🚀 Все пакеты успешно собраны и протестированы!"
    - echo "Список готовых файлов (.deb и .rpm):"
    - find build/packages/ -type f
  needs:
    - job: test
    - job: package
      artifacts: true