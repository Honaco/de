stages:
  - validate
  - build
  - package
  - test
  - release

variables:
  OUTPUT_DIR: "$CI_PROJECT_DIR/build"
  BUILD_NUMBER: "$CI_PIPELINE_IID"
  MODULE_VERSION: "${CI_COMMIT_TAG:-1.0.0}-build${CI_PIPELINE_IID}-g${CI_COMMIT_SHORT_SHA}"
  OS_IMAGE: "debian:12" # Фиксируем ОС для чистоты эксперимента

.env_template:
  image: $OS_IMAGE
  before_script:
    - export DEBIAN_FRONTEND=noninteractive
    - apt-get update -yqq
    - apt-get install -yqq build-essential sudo git linux-headers-amd64 rpm kmod udev

validate-build-system:
  stage: validate
  extends: .env_template
  script:
    - apt-get install -yqq make
    - make help

build:
  stage: build
  extends: .env_template
  script:
    - export KERNEL_HEADERS="/lib/modules/$(uname -r)/build"
    - export TARGET_OS="debian"
    - export TARGET_ARCH=$(uname -m)
    - make ci-build
  artifacts:
    paths:
      - build/
      - driver/
      - tools/
    expire_in: 1 week

package:
  stage: package
  extends: .env_template
  script:
    - export TARGET_OS="debian"
    - make ci-package
  needs:
    - job: build
      artifacts: true
  artifacts:
    paths:
      - build/packages/
    expire_in: 2 weeks

test:
  stage: test
  extends: .env_template
  tags:
    - 0_30_run  # Укажи здесь тег своего раннера на ВМ
  script:
    - export TARGET_OS="debian"
    # 1. Поиск пакета
    - DEB_FILE=$(find build/packages -name "*.deb" | head -n 1)
    - "[ -z \"$DEB_FILE\" ] && exit 1"
    
    # 2. Установка (с правами root)
    - sudo dpkg -i $DEB_FILE
    - sudo apt-get install -f -y
    - PKG_NAME=$(dpkg-deb -f $DEB_FILE Package)
    
    # 3. Загрузка драйвера (теперь это будет работать по-настоящему!)
    - KO_FILE=$(find /lib/modules -name "accord-le.ko" | head -n 1)
    - echo "🔍 Загрузка драйвера..."
    - sudo insmod $KO_FILE
    
    # 4. Проверка загрузки
    - lsmod | grep accord-le
    
    # 5. Выгрузка и удаление[cite: 2]
    - sudo rmmod accord-le
    - sudo apt-get remove -y $PKG_NAME
    
    - echo "✅ Тесты на Debian 12 пройдены успешно!"

release-artifacts:
  stage: release
  extends: .env_template
  script:
    - echo "🚀 Релиз готов"
  needs:
    - job: test
    - job: package
      artifacts: true