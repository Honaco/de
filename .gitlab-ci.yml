# ==========================================
# GitLab CI/CD Pipeline для Accord-LE
# ТЗ п. 4, 5, 6, 7, 8
# Поддержка: Debian 11, Debian 12
# ==========================================

stages:
  - validate
  - build
  - package
  - test
  - release

# ==========================================
# Глобальные переменные (ТЗ п. 3.3, 7)
# ==========================================
variables:
  GIT_DEPTH: "20"
  MODULE_VERSION: "$CI_COMMIT_TAG"
  BUILD_NUM: "$CI_PIPELINE_IID"
  OUTPUT_DIR: "$CI_PROJECT_DIR/build"

# ==========================================
# Reusable Templates (ТЗ п. 4.2)
# ==========================================

# Шаблон валидации
.validate-template:
  stage: validate
  image: alpine:latest
  before_script:
    - apk add --no-cache git make bash
  script:
    - echo "🔍 Валидация конфигурации..."
    - echo "CI_COMMIT_TAG: ${CI_COMMIT_TAG:-not set}"
    - echo "CI_PIPELINE_IID: $CI_PIPELINE_IID"
    - make help
    - echo "✅ Валидация пройдена"

# Шаблон сборки для DEB-дистрибутивов (ТЗ п. 3.1, 3.4, 3.5)
.build-deb-template:
  stage: build
  before_script:
    - echo " Подготовка окружения..."
    - apt update
    - apt install -y git build-essential make kmod wget curl
    - echo "🔍 Версия ядра хоста: $(uname -r)"
    - echo "🔍 Дистрибутив: $DISTRO"
    # Установка kernel headers (ТЗ п. 3.5)
    - |
      KERNEL_VER=$(uname -r)
      echo "🔍 Установка linux-headers-$KERNEL_VER..."
      apt install -y linux-headers-$KERNEL_VER || \
      (echo "⚠️ Заголовки $KERNEL_VER не найдены, пробуем generic..." && \
       apt install -y linux-headers-amd64 || \
       apt install -y linux-headers-generic)
    - echo "🔍 Проверка заголовков:"
    - ls -la /lib/modules/$(uname -r)/build || echo "⚠️ Заголовки не найдены"
    # Настройка git
    - git remote set-url origin http://localhost/root/33.git 2>/dev/null || true
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
  script:
    - echo "🔨 Сборка Accord-LE..."
    - echo "MODULE_VERSION: ${MODULE_VERSION:-1.0.0}"
    - echo "BUILD_NUM: $BUILD_NUM"
    - make ci-build MODULE_VERSION=${MODULE_VERSION:-1.0.0} BUILD_NUM=$BUILD_NUM
    - echo "✅ Сборка завершена"
    - echo "📂 Содержимое build/:"
    - ls -la build/ || echo "build/ не создан"
  artifacts:
    paths:
      - build/
    expire_in: 1 week

# Шаблон упаковки DEB (ТЗ п. 5, 6.2)
.package-deb-template:
  stage: package
  image: debian:12
  before_script:
    - apt update
    - apt install -y git dpkg-dev make kmod
    - git remote set-url origin http://localhost/root/33.git 2>/dev/null || true
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
  script:
    - echo "📦 Упаковка в DEB..."
    - make ci-package MODULE_VERSION=${MODULE_VERSION:-1.0.0} BUILD_NUM=$BUILD_NUM
    - echo "✅ DEB пакеты созданы"
    - ls -lh build/*.deb 2>/dev/null || echo "⚠️ DEB пакеты не найдены"
  artifacts:
    paths:
      - build/*.deb
      - build/*.tar.gz
    expire_in: 1 week

# Шаблон тестирования (ТЗ п. 8)
.test-template:
  stage: test
  image: debian:12
  before_script:
    - apt update
    - apt install -y git make kmod
    - git remote set-url origin http://localhost/root/33.git 2>/dev/null || true
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
  script:
    - echo "🧪 Тестирование..."
    - make ci-test MODULE_VERSION=${MODULE_VERSION:-1.0.0} BUILD_NUM=$BUILD_NUM
    - echo "✅ Тесты пройдены"
  artifacts:
    paths:
      - build/logs/
    expire_in: 1 week
  when: always

# ==========================================
# Валидация (ТЗ п. 4.3)
# ==========================================
validate-config:
  extends: .validate-template

# ==========================================
# Build Matrix (ТЗ п. 3.4, 4.2)
# ==========================================

# Debian 12 (Bookworm)
build-debian-12:
  extends: .build-deb-template
  image: debian:12
  variables:
    DISTRO: "debian-12"
    TARGET_OS: "debian"
    TARGET_ARCH: "amd64"

# Debian 11 (Bullseye)
build-debian-11:
  extends: .build-deb-template
  image: debian:11
  variables:
    DISTRO: "debian-11"
    TARGET_OS: "debian"
    TARGET_ARCH: "amd64"

# ==========================================
# Упаковка (ТЗ п. 5, 6)
# ==========================================

package-debian-12:
  extends: .package-deb-template
  needs: ["build-debian-12"]
  variables:
    DISTRO: "debian-12"

package-debian-11:
  extends: .package-deb-template
  needs: ["build-debian-11"]
  variables:
    DISTRO: "debian-11"

# ==========================================
# Тестирование (ТЗ п. 8)
# ==========================================

test-debian-12:
  extends: .test-template
  needs: ["package-debian-12"]
  variables:
    DISTRO: "debian-12"

test-debian-11:
  extends: .test-template
  needs: ["package-debian-11"]
  variables:
    DISTRO: "debian-11"

# ==========================================
# Release (ТЗ п. 6.2, 7)
# ==========================================
release:
  stage: release
  image: alpine:latest
  before_script:
    - apk add --no-cache curl jq
  script:
    - echo "📦 Создание релиза ${CI_COMMIT_TAG:-$MODULE_VERSION}"
    - echo "✅ Релиз готов"
  artifacts:
    paths:
      - build/*.deb
      - build/*.tar.gz
    expire_in: 3 months
  rules:
    - if: $CI_COMMIT_TAG

# ==========================================
# Правила запуска (ТЗ п. 4.2)
# ==========================================
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_TAG
    - when: always