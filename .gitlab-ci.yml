stages:
  - validate
  - build
  - package
  - test
  - release

variables:
  OUTPUT_DIR: "$CI_PROJECT_DIR/build"
  BUILD_NUMBER: "$CI_PIPELINE_IID"
  MODULE_VERSION: "${CI_COMMIT_TAG:-1.0.0}-build${CI_PIPELINE_IID}-g${CI_COMMIT_SHORT_SHA}"

.env_template:
  before_script:
    - export DEBIAN_FRONTEND=noninteractive
    - apt-get update -yqq
    - apt-get install -yqq build-essential sudo git linux-headers-generic rpm kmod udev

validate-build-system:
  stage: validate
  image: ubuntu:22.04
  script:
    - export DEBIAN_FRONTEND=noninteractive
    - apt-get update -yqq
    - apt-get install -yqq make git
    - make help

build:matrix:
  extends: .env_template
  stage: build
  parallel:
    matrix:
      - OS_IMAGE: ["ubuntu:20.04", "ubuntu:22.04", "ubuntu:24.04", "debian:11", "debian:12"]
  image: $OS_IMAGE
  script:
    - export TARGET_ARCH=$(uname -m)
    - export TARGET_OS=$(awk -F= '/^ID=/ {print $2}' /etc/os-release | tr -d '"' || echo "debian")
    
    # Поиск настроенных заголовков
    - export KERNEL_HEADERS_DIR=$(ls -d /usr/src/linux-headers-*-generic 2>/dev/null | head -n 1 || ls -d /usr/src/linux-headers-*-amd64 2>/dev/null | head -n 1 || ls -d /usr/src/linux-headers-* 2>/dev/null | grep -v "common" | head -n 1)
    - if [ -z "$KERNEL_HEADERS_DIR" ]; then export KERNEL_HEADERS_DIR="/lib/modules/$(uname -r)/build"; fi
    
    - export KERNEL_HEADERS="$KERNEL_HEADERS_DIR"
    - export TARGET_OS="$TARGET_OS"
    - export TARGET_ARCH="$TARGET_ARCH"
    - export MODULE_VERSION="$MODULE_VERSION"
    - export BUILD_NUMBER="$BUILD_NUMBER"
    - export OUTPUT_DIR="$OUTPUT_DIR"
    
    - echo "Выбрана директория заголовков ядра - $KERNEL_HEADERS"
    - make ci-build
  artifacts:
    name: "accord-le-build-$OS_IMAGE-$CI_PIPELINE_IID"
    paths:
      - build/
      - driver/
      - tools/
    expire_in: 1 week

package:matrix:
  extends: .env_template
  stage: package
  parallel:
    matrix:
      - OS_IMAGE: ["ubuntu:20.04", "ubuntu:22.04", "ubuntu:24.04", "debian:11", "debian:12"]
  image: $OS_IMAGE
  script:
    - export TARGET_ARCH=$(uname -m)
    - export TARGET_OS=$(awk -F= '/^ID=/ {print $2}' /etc/os-release | tr -d '"' || echo "debian")
    - export MODULE_VERSION="$MODULE_VERSION"
    - export BUILD_NUMBER="$BUILD_NUMBER"
    - export OUTPUT_DIR="$OUTPUT_DIR"
    - make ci-package
  needs:
    - job: build:matrix
      artifacts: true
  artifacts:
    name: "accord-le-packages-$OS_IMAGE-$CI_PIPELINE_IID"
    paths:
      - build/packages/
    expire_in: 2 weeks

test:matrix:
  extends: .env_template
  stage: test
  parallel:
    matrix:
      - OS_IMAGE: ["ubuntu:20.04", "ubuntu:22.04", "ubuntu:24.04", "debian:11", "debian:12"]
  image: $OS_IMAGE
  script:
    - export TARGET_OS=$(awk -F= '/^ID=/ {print $2}' /etc/os-release | tr -d '"' || echo "debian")
    - echo "🧪 Запуск тестов для $TARGET_OS..."
    
    # Поиск пакетов
    # Ищем конкретно пакет драйвера, исключая tools (или указывая точное имя, если оно содержит driver)
    - DEB_FILE=$(find build/packages/$TARGET_OS -name "*.deb" | grep -v "tools" | head -n 1)
    - RPM_FILE=$(find build/packages/$TARGET_OS -name "*.rpm" | grep -v "tools" | head -n 1)
    
    # 1. Установка пакета и динамическое определение его имени
    - if [ -n "$DEB_FILE" ]; then
        echo "📥 Установка DEB: $DEB_FILE";
        dpkg -i $DEB_FILE;
        apt-get install -f -y;
        PKG_NAME=$(dpkg-deb -f $DEB_FILE Package);
      elif [ -n "$RPM_FILE" ]; then
        echo "📥 Установка RPM: $RPM_FILE";
        rpm -i $RPM_FILE;
        PKG_NAME=$(rpm -qp --queryformat '%{NAME}' $RPM_FILE);
      else
        echo "⚠️ Пакет не найден";
        exit 1;
      fi

    - echo "📦 Установлен пакет с именем: $PKG_NAME"

    # 2. Поиск и загрузка драйвера (динамический путь)
    - echo "🔍 Загрузка драйвера accord-le..."
    - KO_FILE=$(find /lib/modules -name "accord-le.ko" | head -n 1)
    - if [ -z "$KO_FILE" ]; then echo "❌ Файл accord-le.ko не найден в /lib/modules!"; exit 1; fi
    - echo "Файл модуля найден: $KO_FILE"
    
    # Пытаемся загрузить. В Docker без privileged режима это упадет (что нормально), поэтому перехватываем ошибку
    - insmod $KO_FILE

    # 3. Проверка загрузки
    - echo "✅ Проверка загрузки модуля..."
    - lsmod | grep accord-le

    # 4. Выгрузка и удаление (используем реальное имя пакета)
    - echo "🗑️ Выгрузка драйвера и удаление пакета..."
    - rmmod accord-le
    - if [ -n "$DEB_FILE" ]; then
        apt-get remove -y $PKG_NAME;
      elif [ -n "$RPM_FILE" ]; then
        rpm -e $PKG_NAME;
      fi

    - echo "✅ Тесты для $TARGET_OS пройдены!"
  needs:
    - job: package:matrix
      artifacts: true

release-artifacts:
  stage: release
  image: ubuntu:22.04
  script:
    - echo "🚀 Все тесты пройдены."
    - ls -R build/packages/
  needs:
    - job: test:matrix
    - job: package:matrix
      artifacts: true
  artifacts:
    name: "accord-le-final-dist-$CI_PIPELINE_IID"
    paths:
      - build/packages/
    expire_in: 4 weeks